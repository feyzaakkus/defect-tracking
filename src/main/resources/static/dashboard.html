<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defect Tracking System - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#"><i class="bi bi-bug-fill text-warning me-2"></i>Defect Tracker</a>
        <div class="d-flex align-items-center text-white">
            <span class="me-3" id="userBadge">Welcome, <b id="navUsername">User</b></span>
            <button class="btn btn-outline-light btn-sm" id="logoutBtn">Logout</button>
        </div>
    </div>
</nav>

<div class="container mb-5">
    <!-- Metrics Cards -->
    <div class="row g-3 mb-4" id="metricsRow">
        <div class="col-md-3">
            <div class="card bg-primary text-white p-3">
                <div class="fs-6 opacity-75">Total Defects</div>
                <div class="fs-2 fw-bold" id="metricTotal">0</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-warning text-dark p-3">
                <div class="fs-6 opacity-75">Open Defects</div>
                <div class="fs-2 fw-bold" id="metricOpen">0</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-success text-white p-3">
                <div class="fs-6 opacity-75">Resolved Defects</div>
                <div class="fs-2 fw-bold" id="metricResolved">0</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-danger text-white p-3">
                <div class="fs-6 opacity-75">Critical Severity</div>
                <div class="fs-2 fw-bold" id="metricCritical">0</div>
            </div>
        </div>
    </div>

    <!-- Table Header & Action -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="m-0 text-secondary">Defect Records</h4>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newDefectModal">
            <i class="bi bi-plus-circle me-1"></i> Create Defect
        </button>
    </div>

    <!-- Defects Table -->
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Title & Description</th>
                        <th>Severity</th>
                        <th>Priority</th>
                        <th>Status</th>
                        <th>Created By</th>
                        <th class="text-end">Actions</th>
                    </tr>
                    </thead>
                    <tbody id="defectTableBody">
                    <tr><td colspan="7" class="text-center py-4 text-muted">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Modal: Create Defect -->
<div class="modal fade" id="newDefectModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Create New Defect</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="createDefectForm">
                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input type="text" id="defectTitle" class="form-control" required placeholder="e.g. Payment modal crash">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea id="defectDesc" class="form-control" rows="3" required></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Severity</label>
                            <select id="defectSeverity" class="form-select">
                                <option value="LOW">LOW</option>
                                <option value="MEDIUM" selected>MEDIUM</option>
                                <option value="HIGH">HIGH</option>
                                <option value="CRITICAL">CRITICAL</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Priority</label>
                            <select id="defectPriority" class="form-select">
                                <option value="LOW">LOW</option>
                                <option value="MEDIUM" selected>MEDIUM</option>
                                <option value="HIGH">HIGH</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Submit Defect</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
